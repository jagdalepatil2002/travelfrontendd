<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AI Travel Planner</h1>
        <p>Your personal guide to the world's wonders</p>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="location-input" placeholder="Enter a city or landmark (e.g., Rome)">
            <button id="search-button">Find Places</button>
        </div>

        <div id="loader" class="loader" style="display: none;"></div>

        <div id="results-container" class="results-container">
            <!-- Search results will be displayed here -->
        </div>
    </main>

    <!-- Modal for detailed description -->
    <div id="details-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="modal-loader" class="loader" style="display: none;"></div>
            <div id="modal-body">
                <!-- Detailed description will be loaded here -->
                <div class="lds-ellipsis"><div></div><div></div><div></div><div></div></div>
                </div>
                <button id="listen-button" class="listen-btn" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-volume-2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    Listen
                </button>
                <p id="place-description"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
